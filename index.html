<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Monthly Reports | Standard Management Company</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<style>
  :root {
    --green:#1f4f3a; --green-2:#149671; --green-tint:#eef5f1; --green-line:#cfe3d9;
    --amber:#f59e0b; --ink:#111827; --muted:#6b7280; --slate:#374151;
    --bg:#f7f8f5; --card:#ffffff; --line:#e5e7eb;
    --head: 'Montserrat', system-ui, sans-serif;
    --body: 'Source Sans 3', 'Source Sans Pro', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family:var(--body); background:var(--bg); color:var(--ink); font-size:16.5px; }

  header { background:var(--green); padding:26px 24px 22px; border-bottom:4px solid var(--amber); }
  .brand { max-width:900px; margin:0 auto; display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; }
  .brand h1 { margin:0; font-family:var(--head); font-weight:700; font-size:1.28rem;
              letter-spacing:.14em; color:#fff; text-transform:uppercase; }
  .brand span { font-family:var(--head); font-weight:500; font-size:.78rem; letter-spacing:.18em;
                text-transform:uppercase; color:#bcd9cb; }

  .wrap { max-width:900px; margin:28px auto 72px; padding:0 18px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px;
          box-shadow:0 1px 3px rgba(17,24,39,.06); }

  /* ---- password gate ---- */
  #gate { max-width:440px; margin:9vh auto; text-align:center; padding:40px 36px; }
  #gate .lockmark { width:52px; height:52px; margin:0 auto 14px; border-radius:50%;
    background:var(--green-tint); border:1.5px solid var(--green-line);
    display:flex; align-items:center; justify-content:center; }
  #gate .lockmark svg { width:22px; height:22px; stroke:var(--green); }
  #gate h2 { margin:0 0 4px; font-family:var(--head); font-weight:600; font-size:1.05rem;
             letter-spacing:.05em; text-transform:uppercase; color:var(--green); }
  #gate p  { margin:0 0 18px; color:var(--muted); font-size:.92rem; }
  #gate input[type=password] { width:100%; padding:12px 14px; font-size:1rem; font-family:var(--body);
    border:1.5px solid var(--line); border-radius:8px; margin-bottom:10px; outline:none; }
  #gate input[type=password]:focus { border-color:var(--green-2); }
  #gate .err { color:#b3402a; font-size:.85rem; min-height:1.3em; margin-bottom:6px; }
  button.primary { width:100%; padding:12px 18px; font-size:.9rem; font-family:var(--head);
    font-weight:600; letter-spacing:.08em; text-transform:uppercase; border:0; border-radius:8px;
    background:var(--green); color:#fff; cursor:pointer; transition:background .15s; }
  button.primary:hover { background:var(--green-2); }

  /* ---- report view ---- */
  .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:18px; flex-wrap:wrap; }
  .toolbar label { font-family:var(--head); font-size:.72rem; font-weight:600; letter-spacing:.12em;
                   text-transform:uppercase; color:var(--muted); }
  .toolbar select { padding:9px 14px; font-size:.95rem; font-family:var(--body); color:var(--ink);
    background:#fff; border:1.5px solid var(--line); border-radius:8px; }
  .toolbar .spacer { flex:1; }
  .toolbar .lock { padding:9px 18px; font-size:.78rem; font-family:var(--head); font-weight:600;
    letter-spacing:.08em; text-transform:uppercase; border:1.5px solid var(--line); border-radius:8px;
    background:#fff; color:var(--slate); cursor:pointer; }
  .toolbar .lock:hover { border-color:var(--green-2); color:var(--green); }

  #reportcard { padding:38px 44px; }
  @media (max-width:640px){ #reportcard { padding:26px 20px; } }
  #report { line-height:1.62; }
  #report > h1 { font-family:var(--head); font-weight:700; font-size:1.42rem; line-height:1.3;
    color:var(--green); border-bottom:3px solid var(--green); padding-bottom:12px; margin-top:0; }
  #report h2 { font-family:var(--head); font-weight:600; font-size:1.02rem; letter-spacing:.04em;
    text-transform:uppercase; color:var(--green); margin-top:2.1em;
    padding-left:12px; border-left:4px solid var(--amber); }
  #report h3 { font-family:var(--head); font-weight:600; font-size:.95rem; color:var(--slate); }
  #report a { color:var(--green-2); }
  #report strong { color:var(--ink); }
  #report table { border-collapse:collapse; width:100%; margin:14px 0; font-size:.93rem; }
  #report th { font-family:var(--head); font-size:.74rem; font-weight:600; letter-spacing:.06em;
    text-transform:uppercase; background:var(--green); color:#fff; padding:8px 12px; text-align:left; }
  #report td { border:1px solid var(--green-line); padding:7px 12px; }
  #report tr:nth-child(even) td { background:var(--green-tint); }
  #report hr { border:0; border-top:1px solid var(--line); margin:28px 0; }
  #report blockquote { border-left:3px solid var(--green-2); margin:0; padding:2px 16px; color:var(--muted); }
  #report code { background:var(--green-tint); border-radius:4px; padding:1px 6px; font-size:.88em; }

  .hidden { display:none; }
  footer { text-align:center; color:var(--muted); font-size:.78rem; margin-top:30px; }
  footer .tag { font-family:var(--head); letter-spacing:.1em; text-transform:uppercase; font-size:.68rem;
                color:var(--green-2); display:block; margin-bottom:4px; }
</style>
</head>
<body>
<header>
  <div class="brand">
    <h1>Standard Management Company</h1>
    <span>Monthly Reports &middot; Internal</span>
  </div>
</header>

<div class="wrap">
  <div id="gate" class="card">
    <div class="lockmark">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h2>Team Access</h2>
    <p>Enter the shared password to view the reports.</p>
    <input type="password" id="pw" placeholder="Password" autofocus>
    <div class="err" id="err"></div>
    <button class="primary" id="unlock">Unlock</button>
  </div>

  <div id="app" class="hidden">
    <div class="toolbar">
      <label for="picker">Report</label>
      <select id="picker"></select>
      <div class="spacer"></div>
      <button class="lock" id="lock">Lock</button>
    </div>
    <div class="card" id="reportcard"><div id="report">Loading&hellip;</div></div>
    <footer>
      <span class="tag">Standard Management Company &middot; Waterville, Maine</span>
      Content is AES-256-GCM encrypted at rest. Decryption happens in your browser only.
    </footer>
  </div>
</div>

<script>
const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
let manifest = null, password = null;

async function deriveKey(pw, salt, iterations) {
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations, hash: 'SHA-256' },
    base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
}

async function decryptReport(file, pw) {
  const enc = await (await fetch(file, {cache: 'no-store'})).json();
  const key = await deriveKey(pw, b64(enc.salt), enc.iterations);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(enc.nonce) }, key, b64(enc.ciphertext));
  return new TextDecoder().decode(pt);
}

async function showReport(id) {
  const r = manifest.reports.find(x => x.id === id);
  document.getElementById('report').textContent = 'Decrypting…';
  try {
    const md = await decryptReport(r.file, password);
    document.getElementById('report').innerHTML = marked.parse(md);
  } catch (e) {
    document.getElementById('report').textContent = 'Decryption failed for this report.';
  }
}

async function unlock() {
  const pw = document.getElementById('pw').value;
  const err = document.getElementById('err');
  err.textContent = '';
  if (!pw) return;
  if (!manifest) manifest = await (await fetch('manifest.json', {cache: 'no-store'})).json();
  if (!manifest.reports.length) { err.textContent = 'No reports published yet.'; return; }
  document.getElementById('unlock').textContent = 'Checking…';
  try {
    await decryptReport(manifest.reports[0].file, pw);
  } catch (e) {
    err.textContent = 'Wrong password.';
    document.getElementById('unlock').textContent = 'Unlock';
    return;
  }
  password = pw;
  sessionStorage.setItem('smc_pw', pw);
  const picker = document.getElementById('picker');
  picker.innerHTML = manifest.reports.map(r => `<option value="${r.id}">${r.title}</option>`).join('');
  picker.onchange = () => showReport(picker.value);
  document.getElementById('gate').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  showReport(manifest.reports[0].id);
}

document.getElementById('unlock').onclick = unlock;
document.getElementById('pw').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
document.getElementById('lock').onclick = () => { sessionStorage.removeItem('smc_pw'); location.reload(); };

const saved = sessionStorage.getItem('smc_pw');
if (saved) { document.getElementById('pw').value = saved; unlock(); }
</script>
</body>
</html>
